services:
  - type: web
    name: museai-music-generator
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:create_app() --workers 1 --threads 2 --timeout 300 --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"
    disk:
      name: museai-storage
      mountPath: /opt/render/project/src/backend
      sizeGB: 1
